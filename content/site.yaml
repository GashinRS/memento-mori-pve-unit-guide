assumptions:
  title: Before You Read
  cards:
    - title: Gear Requirements
      icon: "&#9878;"
      text: |
        As a general rule of thumb, you always want as much Defense as possible on your support units.
        This means that SR gear is actually a really cost-effective way to get a lot of defense, because
        the 4-set bonus gives a 30% Defense buff. Due to this, almost every support unit wants to have
        4 SR with the boots and gloves (the two gear pieces that give defense) being as high level as
        possible.

        When it comes to upgrade investment, all your upgrades should go to boots and gloves
        first once you max out the weapon, other gear pieces can safely be ignored as they do not contribute
        as much. For example, if your level link is 360, the gear your supports want is level 360 SR boots
        and gloves, and then 2 level 240 pieces of SR gear between the helmet, dress and necklace. When
        other gear is expected, this will be clearly stated in that unit's section.
    - title: Character Rarity Requirements
      icon: "&#9733;"
      text: |
        As a general rule of thumb, support units only require one copy, and having more often does not yield
        better performance. The expected rarity for every unit in this list will be visible from the icons
        used. When a character performs noticeably better at higher rarities, this will be clearly stated
        in the unit's section.
glossary:
  title: Glossary
  terms:
    - term: Enfeeble
      definition: |
        This debuff decreases a character's ATK.
        Unlike normal Decreased Stat debuffs,
        the amount a target's stat is decreased by via Enfeeble is calculated based on their in-battle stat.
    - term: Multi-Barrier
      aliases: [Multi-Barriers]
      definition: |
        This buff provides a multi-layered barrier.
        When a character takes damage,
        1 barrier layer is depleted to nullify that damage.
        If Multi-Barrier is overlapped with Invulnerable, the barrier layer will not be depleted.
        If Multi-Barrier is overlapped with Shield, Multi-Barrier will be used first.
        If multiple kinds of Multi-Barrier are overlapping with each other, they will be used based on the following order of priority.
    - term: UW
      definition: Unique Weapon
