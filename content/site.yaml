    note: |
      While units are not bad, they are either outshadowed by stronger alternatives or are meant to be
      paired with Florence who is outshadowed herself by Cordie. They may still be worth considering when
      preferred units are unavailable due to the long rerun cycles (~6 months) in this game, or if they align
      with your personal progression goals. That said, the general advice is to pass on them for PVE purposes and
      conserve resources (both Diamonds and Crystals) unless you have a specific reason to pull, like using them in PVP as well.
