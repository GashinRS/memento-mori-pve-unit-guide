<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memento Mori — PvE Limited Unit Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
    <script src="data/generated-content.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body id="top">
<a class="back-to-top" href="#top" aria-label="Back to top">↑</a>
<div class="page-wrap">

    <header id="site-header"></header>

    <nav class="nav" id="site-nav"></nav>

    <nav class="nav page-nav">
        <a href="index.html" aria-current="page">Limited PvE Guide</a>
        <a href="base-pool.html">Base Pool Guide</a>
        <a href="concepts.html">PvE Concepts</a>
    </nav>

    <!-- ── WIP Banner ── -->
    <div id="wip-banner"></div>

    <!-- ── Guide Assumptions ── -->
    <div id="assumptions-block"></div>

    <div id="glossary-block"></div>

    <div id="unit-overview"></div>

    <div class="legend">
        <div>
            <div class="legend-group-title">Paired Unit Badges</div>
            <div class="legend-items">
                <div class="legend-item"><span class="pair-badge dps">DPS</span> Main or sub damage dealer</div>
                <div class="legend-item"><span class="pair-badge support">Support</span> Enabler or buffer</div>
                <div class="legend-item"><span class="pair-badge required">Required</span> Must-have teammate</div>
            </div>
        </div>
        <div>
            <div class="legend-group-title">Weapon Investment</div>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="legend-weapon-sample">
                        <div class="weapon-icon optional" style="width:36px;height:36px"></div>
                        <div class="weapon-marker optional"></div>
                    </div>
                    Optional — minor gains
                </div>
                <div class="legend-item">
                    <div class="legend-weapon-sample">
                        <div class="weapon-icon recommended" style="width:36px;height:36px"></div>
                        <div class="weapon-marker recommended"><span></span></div>
                    </div>
                    Recommended — noticeable upgrade
                </div>
                <div class="legend-item">
                    <div class="legend-weapon-sample">
                        <div class="weapon-icon required" style="width:36px;height:36px"></div>
                        <div class="weapon-marker required"><span></span><span></span></div>
                    </div>
                    Required — unit needs this
                </div>
            </div>
        </div>
    </div>

    <div id="mount"></div>

    <footer id="site-footer"></footer>

</div>

<script>
    /* ── Helpers ── */
    function textHtml(text) {
        return String(text || '').replace(/\n/g, '<br>');
    }

    function imgFB(src, alt, fb) {
        return '<img src="' + src + '" alt="' + alt + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' + fb;
    }

    function unitIcon(id, size) {
        size = size || '4.75rem';
        return '<div class="unit-icon" style="width:' + size + ';height:' + size + '">' +
            imgFB('icons/units/' + id + '.png', id,
                '<div class="placeholder-label" style="display:none">Unit<br>Icon</div>') +
            '</div>';
    }

    function unitAnchor(unit) {
        return 'unit-' + unit.id;
    }

    function glossaryAnchor(term) {
        return 'glossary-' + String(term || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function escapeRegExp(text) {
        return String(text).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function linkPlainTextSegments(html, pattern, replacer) {
        return html.split(/(<[^>]+>)/g).map(function(part) {
            if (part.charAt(0) === '<') return part;
            return part.replace(pattern, replacer);
        }).join('');
    }

    function linkGlossaryTerms(html) {
        var glossary = SITE_CONTENT.glossary;
        if (!glossary || !glossary.terms) return html;
        var terms = [];
        glossary.terms.forEach(function(entry) {
            [entry.term].concat(entry.aliases || []).forEach(function(label) {
                terms.push({ label: label, anchor: glossaryAnchor(entry.term) });
            });
        });
        terms.sort(function(a, b) { return b.label.length - a.label.length; });
        var pattern = new RegExp('\\b(' + terms.map(function(term) {
            return escapeRegExp(term.label);
        }).join('|') + ')\\b', 'g');
        var anchorByLabel = {};
        terms.forEach(function(term) { anchorByLabel[term.label] = term.anchor; });
        return linkPlainTextSegments(html, pattern, function(match) {
            return '<a class="glossary-link" href="#' + anchorByLabel[match] + '">' + match + '</a>';
        });
    }

    function listedUnits() {
        return SECTIONS.flatMap(function(sec) {
            return UNITS[sec.key] || [];
        });
    }

    function linkUnitMentions(html, currentUnit) {
        var units = listedUnits().filter(function(unit) {
            return unit.id !== currentUnit.id && unit.name !== currentUnit.name;
        });
        var byName = {};
        units.forEach(function(unit) {
            if (!byName[unit.name]) byName[unit.name] = unitAnchor(unit);
        });
        var names = Object.keys(byName).sort(function(a, b) { return b.length - a.length; });
        if (!names.length) return html;
        var pattern = new RegExp('(^|[^A-Za-z0-9])(' + names.map(escapeRegExp).join('|') + ')(?=$|[^A-Za-z0-9])', 'g');
        return linkPlainTextSegments(html, pattern, function(match, prefix, name) {
            return prefix + '<a class="unit-mention-link" href="#' + byName[name] + '">' + name + '</a>';
        });
    }

    function linkGuideTerms(html, currentUnit) {
        return linkGlossaryTerms(linkUnitMentions(html, currentUnit));
    }

    /* ── Weapons ── */
    function renderWeapons(weapons) {
        if (!weapons || weapons.length === 0) {
            return '<span class="no-weapon-badge">No weapon needed</span>';
        }
        return weapons.map(function(w) {
            var tierLabel = { optional: 'Optional', recommended: 'Recommended', required: 'Required' }[w.tier] || w.tier;
            var tipText = tierLabel + (w.description ? ' — click for details' : '');
            var desc = w.description ? '<div class="weapon-desc">' + w.description + '</div>' : '';
            var markerDots = { optional: 0, recommended: 1, required: 2 }[w.tier] || 0;
            var marker = '<div class="weapon-marker ' + w.tier + '" aria-hidden="true">' +
                Array(markerDots + 1).join('<span></span>') +
                '</div>';
            return '<div class="weapon-wrap" onclick="this.classList.toggle(\'active\')">' +
                '<div class="weapon-icon ' + w.tier + '">' +
                imgFB('icons/weapons/' + w.level + '.png', w.level, '') +
                '</div>' +
                marker +
                '<div class="weapon-tooltip">' + tipText + '</div>' +
                desc +
                '</div>';
        }).join('');
    }

    /* ── Pairs ── */
    function renderPairs(pairs) {
        if (!pairs || !pairs.length) return '';
        var chips = pairs.map(function(p) {
            return '<div class="pair-group">' +
                '<div class="tip-icon">' +
                '<div class="pair-unit-icon">' +
                imgFB('icons/units/' + p.id + '.png', p.name,
                    '<div class="pair-unit-placeholder" style="display:flex">?</div>') +
                '</div>' +
                '<div class="tip">' + p.name + '</div>' +
                '</div>' +
                '<span class="pair-badge ' + p.badge + '">' + p.badge + '</span>' +
                '</div>';
        }).join('');
        return '<div class="row-label">Pairs Well With</div>' +
            '<div class="pairs-row">' + chips + '</div>';
    }

    /* ── Teams ── */
    // Each slot is now an object: { id, name }
    function renderTeams(teams) {
        if (!teams || !teams.length) return '';
        var rows = teams.map(function(team) {
            var slots = team.slots.map(function(slot, i) {
                return '<div class="tip-icon">' +
                    '<div class="team-slot">' +
                    imgFB('icons/units/' + slot.id + '.png', slot.name,
                        '<div class="slot-placeholder" style="display:none"></div>') +
                    '</div>' +
                    '<div class="tip">' + slot.name + '</div>' +
                    '</div>';
            }).join('');
            var label = team.label
                ? '<span class="team-label">' + team.label + '</span>'
                : '';
            return '<div class="team-row">' + slots + label + '</div>';
        }).join('');
        return '<div class="teams-section">' +
            '<div class="row-label">Team Examples</div>' + rows +
            '</div>';
    }

    /* ── Card ── */
    function renderCard(unit) {
        return '<div class="unit-card" id="' + unitAnchor(unit) + '">' +
            '<div class="unit-top">' +
            unitIcon(unit.id) +
            '<div class="unit-meta">' +
            '<div class="unit-name">' + unit.name + '</div>' +
            '<div class="unit-role">' + unit.role +
            (unit.scalable ? ' <span class="copies-badge">&#8679; scales with copies</span>' : '') +
            '</div>' +
            '<div class="weapons-row">' +
            '<span class="weapons-label">Weapon</span>' +
            renderWeapons(unit.weapons) +
            '</div>' +
            '</div>' +
            '</div>' +
            renderPairs(unit.pairs) +
            renderTeams(unit.teams) +
            '<div class="card-divider"></div>' +
            '<div class="unit-desc">' + linkGuideTerms(unit.desc.trim(), unit) + '</div>' +
            '</div>';
    }

    /* ── Sections ── */
    var SECTIONS = SITE_CONTENT.sections;

    function renderHeader() {
        document.getElementById('site-header').innerHTML =
            '<p class="header-eyebrow">' + SITE_CONTENT.header.eyebrow + '</p>' +
            '<h1>' + textHtml(SITE_CONTENT.header.title) + '</h1>' +
            '<p class="header-sub">' + SITE_CONTENT.header.subtitle + '</p>';
    }

    function renderNav() {
        document.getElementById('site-nav').innerHTML = SECTIONS.map(function(sec) {
            var label = sec.navLabel || sec.label;
            return '<a href="#' + sec.id + '" data-cat="' + sec.key + '">' +
                sec.navIcon + ' ' + label +
                '</a>';
        }).join('');
    }

    function renderWip() {
        var wip = SITE_CONTENT.wip;
        document.getElementById('wip-banner').innerHTML =
            '<div class="wip-banner">' +
            '<div class="wip-icon">&#9998;</div>' +
            '<div class="wip-body">' +
            '<div class="wip-title">' + wip.title + '</div>' +
            '<div class="wip-text">' + wip.text + '</div>' +
            '<ul class="wip-list">' + wip.items.map(function(item) {
                return '<li>' + item + '</li>';
            }).join('') + '</ul>' +
            '</div>' +
            '</div>';
    }

    function renderAssumptions() {
        var assumptions = SITE_CONTENT.assumptions;
        document.getElementById('assumptions-block').innerHTML =
            '<details class="assumptions-block">' +
            '<summary class="assumptions-header">' +
            '<span class="assumptions-toggle"></span>' +
            '<h2>' + assumptions.title + '</h2>' +
            '<div class="assumptions-line"></div>' +
            '</summary>' +
            '<div class="assumptions-grid">' +
            assumptions.cards.map(function(card) {
                return '<div class="assumption-card">' +
                    '<div class="assumption-title">' + card.icon + ' ' + card.title + '</div>' +
                    '<div class="assumption-text">' + linkGlossaryTerms(card.text) + '</div>' +
                    '</div>';
            }).join('') +
            '</div>' +
            '</details>';
    }

    function renderGlossary() {
        var glossary = SITE_CONTENT.glossary;
        if (!glossary || !glossary.terms || !glossary.terms.length) return;
        document.getElementById('glossary-block').innerHTML =
            '<details class="glossary-block">' +
            '<summary class="glossary-header">' +
            '<span class="glossary-toggle"></span>' +
            '<h2>' + glossary.title + '</h2>' +
            '<div class="glossary-line"></div>' +
            '</summary>' +
            '<dl class="glossary-list">' +
            glossary.terms.map(function(entry) {
                return '<div class="glossary-entry" id="' + glossaryAnchor(entry.term) + '">' +
                    '<dt>' + entry.term + '</dt>' +
                    '<dd>' + entry.definition + '</dd>' +
                    '</div>';
            }).join('') +
            '</dl>' +
            '</details>';
    }

    function renderUnitOverview() {
        document.getElementById('unit-overview').innerHTML =
            '<div class="unit-overview">' +
            '<div class="overview-header">' +
            '<h2>Unit Index</h2>' +
            '<div class="overview-line"></div>' +
            '</div>' +
            '<div class="overview-groups">' +
            SECTIONS.map(function(sec) {
                var units = UNITS[sec.key] || [];
                if (!units.length) return '';
                return '<div class="overview-group" data-cat="' + sec.key + '">' +
                    '<div class="overview-label">' + (sec.navLabel || sec.label) + '</div>' +
                    '<div class="overview-icons">' +
                    units.map(function(unit) {
                        return '<a class="overview-icon tip-icon" href="#' + unitAnchor(unit) + '" aria-label="' + unit.name + '">' +
                            imgFB('icons/units/' + unit.id + '.png', unit.name,
                                '<div class="overview-placeholder" style="display:none">?</div>') +
                            '<span class="tip">' + unit.name + '</span>' +
                            '</a>';
                    }).join('') +
                    '</div>' +
                    '</div>';
            }).join('') +
            '</div>' +
            '</div>';
    }

    function renderFooter() {
        document.getElementById('site-footer').innerHTML =
            '<p>' + SITE_CONTENT.footer.text + ' <span>' + SITE_CONTENT.footer.brand + '</span>.</p>';
    }

    function setupBackToTop() {
        var button = document.querySelector('.back-to-top');
        function updateButton() {
            button.classList.toggle('visible', window.scrollY > 500);
        }
        window.addEventListener('scroll', updateButton, { passive: true });
        updateButton();
    }

    document.getElementById('mount').innerHTML = SECTIONS.map(function(sec) {
        var units = UNITS[sec.key] || [];
        var cards = units.map(renderCard).join('');
        var note = sec.note
            ? '<div class="section-note">' + sec.note + '</div>'
            : '';
        return '<section class="section-block" id="' + sec.id + '" data-cat="' + sec.key + '">' +
            '<div class="section-header">' +
            '<h2>' + sec.label + '</h2>' +
            '<span class="section-pill">' + sec.pill + '</span>' +
            '<div class="section-line"></div>' +
            '</div>' +
            note +
            '<div class="unit-grid">' + cards + '</div>' +
            '</section>';
    }).join('');

    renderHeader();
    renderNav();
    renderWip();
    renderAssumptions();
    renderGlossary();
    renderUnitOverview();
    renderFooter();
    setupBackToTop();
</script>
</body>
</html>
